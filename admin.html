<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ кабинет — Роза Оглы</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="wrap">
        <header class="top">
            <div>
                <h1>Админ кабинет</h1>
                <div class="sub">Контроль регистраций, записей, оплат и подписок</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
                <a class="btn" href="index.html">На сайт</a>
                <button class="btn" onclick="clearAdminSession()">Выйти из админки</button>
            </div>
        </header>

        <section class="kpis">
            <article class="kpi"><div class="label">Регистрации</div><div class="val" id="kpiRegs">0</div></article>
            <article class="kpi"><div class="label">Записи на сеанс</div><div class="val" id="kpiBookings">0</div></article>
            <article class="kpi"><div class="label">Покупки подписки</div><div class="val" id="kpiSubs">0</div></article>
            <article class="kpi"><div class="label">Платежи</div><div class="val" id="kpiPays">0</div></article>
            <article class="kpi"><div class="label">Гостевые отзывы</div><div class="val" id="kpiGuest">0</div></article>
        </section>

        <section class="panel">
            <h2>Кто прошел регистрацию</h2>
            <div id="tblRegistrations" class="table-wrap"></div>
        </section>

        <section class="panel">
            <h2>Кто записался на сеанс</h2>
            <div id="tblBookings" class="table-wrap"></div>
        </section>

        <section class="panel">
            <h2>Кто купил подписку</h2>
            <div id="tblSubs" class="table-wrap"></div>
        </section>

        <section class="panel">
            <h2>Платежи</h2>
            <div id="tblPays" class="table-wrap"></div>
        </section>

        <section class="panel">
            <h2>Отзывы гостей</h2>
            <div id="tblGuest" class="table-wrap"></div>
        </section>
    </div>

    <script>
        const ADMIN_ACCESS_CODE = 'ROZA-ADMIN-2026';

        function getStorageArray(key) {
            try {
                return JSON.parse(localStorage.getItem(key) || '[]');
            } catch {
                return [];
            }
        }

        function checkAdmin() {
            const isAdmin = localStorage.getItem('isAdminLoggedIn');
            if (isAdmin === 'true') {
                return true;
            }
            const code = prompt('Введите код администратора');
            if (!code || code.trim() !== ADMIN_ACCESS_CODE) {
                alert('Доступ запрещен');
                window.location.href = 'index.html';
                return false;
            }
            localStorage.setItem('isAdminLoggedIn', 'true');
            return true;
        }

        function renderTable(targetId, columns, rows) {
            const root = document.getElementById(targetId);
            if (!rows.length) {
                root.innerHTML = '<div class="empty">Пока нет данных</div>';
                return;
            }

            const thead = columns.map((c) => '<th>' + c.label + '</th>').join('');
            const tbody = rows.map((r) => {
                const cells = columns.map((c) => '<td>' + (r[c.key] || '—') + '</td>').join('');
                return '<tr>' + cells + '</tr>';
            }).join('');

            root.innerHTML = '<table class="table"><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table>';
        }

        function fmtDate(value) {
            if (!value) return '—';
            const d = new Date(value);
            return isNaN(d.getTime()) ? value : d.toLocaleString('ru-RU');
        }

        function loadAdminData() {
            const registrations = getStorageArray('registrations');
            const bookings = getStorageArray('bookings');
            const subs = getStorageArray('subscriptions');
            const payments = getStorageArray('payments');
            const guest = getStorageArray('guestReviews');

            document.getElementById('kpiRegs').textContent = registrations.length;
            document.getElementById('kpiBookings').textContent = bookings.length;
            document.getElementById('kpiSubs').textContent = subs.length;
            document.getElementById('kpiPays').textContent = payments.length;
            document.getElementById('kpiGuest').textContent = guest.length;

            renderTable('tblRegistrations', [
                { key: 'name', label: 'Имя' },
                { key: 'email', label: 'Email' },
                { key: 'source', label: 'Источник' },
                { key: 'createdAtFmt', label: 'Дата' }
            ], registrations.map((r) => ({ ...r, createdAtFmt: fmtDate(r.createdAt) })));

            renderTable('tblBookings', [
                { key: 'name', label: 'Имя' },
                { key: 'email', label: 'Email' },
                { key: 'service', label: 'Услуга' },
                { key: 'date', label: 'Дата сеанса' },
                { key: 'time', label: 'Время' },
                { key: 'source', label: 'Источник' },
                { key: 'createdAtFmt', label: 'Создано' }
            ], bookings.map((r) => ({ ...r, createdAtFmt: fmtDate(r.createdAt) })));

            renderTable('tblSubs', [
                { key: 'customerName', label: 'Клиент' },
                { key: 'customerEmail', label: 'Email' },
                { key: 'plan', label: 'Тариф' },
                { key: 'amount', label: 'Сумма' },
                { key: 'currency', label: 'Валюта' },
                { key: 'status', label: 'Статус' },
                { key: 'createdAtFmt', label: 'Дата' }
            ], subs.map((r) => ({ ...r, createdAtFmt: fmtDate(r.createdAt) })));

            renderTable('tblPays', [
                { key: 'purpose', label: 'Назначение' },
                { key: 'plan', label: 'Тариф' },
                { key: 'amount', label: 'Сумма' },
                { key: 'status', label: 'Статус' },
                { key: 'createdAtFmt', label: 'Дата' }
            ], payments.map((r) => ({ ...r, createdAtFmt: fmtDate(r.createdAt) })));

            renderTable('tblGuest', [
                { key: 'name', label: 'Имя' },
                { key: 'rating', label: 'Оценка' },
                { key: 'text', label: 'Отзыв' },
                { key: 'createdAtFmt', label: 'Дата' }
            ], guest.map((r) => ({ ...r, createdAtFmt: fmtDate(r.createdAt) })));
        }

        function clearAdminSession() {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'index.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (!checkAdmin()) return;
            loadAdminData();
        });
    </script>
</body>
</html>
